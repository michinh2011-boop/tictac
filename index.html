<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tic Tac Toe Pro</title>
<style>
:root{
  --bg1:#141428; --bg2:#1f2240;
  --accent:#6ea8ff; --accent2:#9ec5ff;
  --x:#ff7a7a; --o:#7ad3ff;
  --win:#ffd24d; --card:#1b1e36;
}
*{box-sizing:border-box}
body{
  margin:0; color:#fff; font-family:system-ui,Segoe UI,Roboto,Arial;
  background: radial-gradient(1200px 800px at 20% -10%, #28306b, transparent),
              linear-gradient(160deg, var(--bg1), var(--bg2));
  min-height:100vh; display:flex; align-items:center; justify-content:center;
}
.container{width:min(980px, 96vw);}
.card{
  background:rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:22px; padding:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
}
h1{margin:10px 0 20px; text-align:center; letter-spacing:1px}
.row{display:flex; gap:14px; flex-wrap:wrap; justify-content:center}
.btn{
  padding:16px 26px; border-radius:16px; border:1px solid rgba(255,255,255,0.2);
  background:linear-gradient(180deg, var(--accent2), var(--accent));
  color:#0d1538; font-weight:700; cursor:pointer; user-select:none;
  box-shadow:0 10px 25px rgba(110,168,255,.35);
  transition:transform .08s ease, box-shadow .15s ease, filter .15s ease;
}
.btn.secondary{
  background:rgba(255,255,255,0.08); color:#fff;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}
.btn:hover{ filter:brightness(1.05); transform:translateY(-1px)}
.btn:active{ transform:translateY(1px) scale(.98)}
.hidden{display:none}

.topbar{
  display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px;
}
.score{display:flex; gap:10px; flex-wrap:wrap}
.badge{
  padding:8px 12px; border-radius:12px; background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
}
.badge span{font-weight:800}
.status{opacity:.9}

.board{
  width:min(90vw, 520px); aspect-ratio:1/1; margin:18px auto 8px;
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
}
.cell{
  border-radius:18px; background:var(--card);
  display:flex; align-items:center; justify-content:center;
  font-size:clamp(36px, 9vw, 64px); font-weight:900;
  cursor:pointer; user-select:none;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.06),
              0 10px 25px rgba(0,0,0,.35);
  transition: transform .08s ease, background .15s ease;
}
.cell:hover{ transform:translateY(-2px)}
.cell:active{ transform:translateY(1px) scale(.98)}
.cell.x{ color:var(--x)}
.cell.o{ color:var(--o)}
.cell.win{ background:linear-gradient(180deg, #3a2b00, #5a4500); box-shadow:0 0 0 2px var(--win) inset}

.line{
  position:absolute; pointer-events:none;
  height:8px; background:var(--win);
  border-radius:6px; transform-origin:left center;
  box-shadow:0 0 12px var(--win);
  opacity:.95;
}

.center{
  display:flex; justify-content:center; align-items:center; flex-direction:column;
}
.big{
  width:min(60vw, 360px); height:min(60vw, 360px);
  display:flex; align-items:center; justify-content:center;
  border-radius:24px; margin:12px auto 0;
}
.footer{display:flex; justify-content:center; gap:10px; margin-top:10px}
.small{opacity:.7; font-size:13px; text-align:center; margin-top:6px}
</style>
</head>
<body>
<div class="container">
  <!-- MENU -->
  <div id="menu" class="card">
    <h1>TIC TAC TOE</h1>
    <div class="row">
      <button class="btn" onclick="start('pvp')">2 NGƯỜI</button>
      <button class="btn" onclick="showDifficulty()">ĐẤU AI</button>
    </div>
    <div id="diff" class="row hidden" style="margin-top:10px">
      <button class="btn secondary" onclick="start('ai','easy')">Easy</button>
      <button class="btn secondary" onclick="start('ai','medium')">Medium</button>
      <button class="btn secondary" onclick="start('ai','hard')">Hard</button>
    </div>
    <div class="small">Chọn chế độ để bắt đầu</div>
  </div>

  <!-- GAME -->
  <div id="game" class="card hidden">
    <div class="topbar">
      <div class="score">
        <div class="badge">X: <span id="sx">0</span></div>
        <div class="badge">O: <span id="so">0</span></div>
        <div class="badge">Hòa: <span id="sd">0</span></div>
      </div>
      <div class="status" id="status">Lượt: X</div>
    </div>

    <div style="position:relative">
      <div id="board" class="board"></div>
      <div id="winLine" class="line hidden"></div>
    </div>

    <div id="result" class="center" style="font-size:28px; min-height:34px;"></div>

    <div class="center">
      <button id="btnPlay" class="btn big hidden" onclick="reset()">CHƠI TIẾP</button>
    </div>

    <div class="footer">
      <button class="btn secondary" onclick="backMenu()">Menu</button>
      <button class="btn secondary" onclick="resetScore()">Reset điểm</button>
    </div>
  </div>
</div>

<script>
// ====== STATE ======
let board, current, over, mode, difficulty;
let score = {X:0, O:0, D:0};
let aiTimer = null;

// ====== AUDIO (không cần file) ======
let audioCtx;
function beep(freq=440, dur=0.06){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = freq; o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    o.start(); o.stop(audioCtx.currentTime + dur);
  }catch(e){}
}
const sfx = {
  click:()=>beep(420, .05),
  win:()=>{beep(700,.12); setTimeout(()=>beep(900,.12),120);},
  draw:()=>beep(260,.12)
};

// ====== UI ======
const el = id => document.getElementById(id);

function showDifficulty(){
  el('diff').classList.remove('hidden');
}
function start(m, diff='easy'){
  mode = m; difficulty = diff;
  el('menu').classList.add('hidden');
  el('game').classList.remove('hidden');
  init();
}
function backMenu(){
  el('game').classList.add('hidden');
  el('menu').classList.remove('hidden');
}
function resetScore(){
  score = {X:0,O:0,D:0};
  updateScore();
}

// ====== GAME ======
function init(){
  board = Array(9).fill("");
  current = "X";
  over = false;
  el('board').innerHTML = "";
  el('result').textContent = "";
  el('btnPlay').classList.add('hidden');
  hideLine();

  for(let i=0;i<9;i++){
    const c = document.createElement('div');
    c.className='cell';
    c.onclick = ()=>onMove(i);
    el('board').appendChild(c);
  }
  setStatus();
}
function reset(){ init(); }

function setStatus(){
  el('status').textContent = over ? "" : `Lượt: ${current}`;
}
function updateScore(){
  el('sx').textContent = score.X;
  el('so').textContent = score.O;
  el('sd').textContent = score.D;
}

function onMove(i){
  if(over || board[i] !== "") return;
  if(mode==='ai' && current==='O') return;

  place(i, current);

  if(checkEnd(current)) return;

  current = current === "X" ? "O" : "X";
  setStatus();

  if(mode==='ai' && current==='O'){
    // AI “mượt” bằng timeout, không khựng
    clearTimeout(aiTimer);
    aiTimer = setTimeout(aiPlay, 280);
  }
}

function place(i, p){
  sfx.click();
  board[i] = p;
  const cell = el('board').children[i];
  cell.textContent = p;
  cell.classList.add(p==='X'?'x':'o');
}

function checkEnd(p){
  const w = getWin(p);
  if(w){
    over = true;
    sfx.win();
    score[p]++; updateScore();
    showWin(w);
    el('result').textContent = `${p} THẮNG!`;
    el('btnPlay').classList.remove('hidden');
    return true;
  }
  if(!board.includes("")){
    over = true;
    sfx.draw();
    score.D++; updateScore();
    el('result').textContent = `HÒA!`;
    el('btnPlay').classList.remove('hidden');
    return true;
  }
  return false;
}

function getWin(p){
  const W = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  return W.find(w => w.every(i => board[i]===p));
}

function showWin(w){
  const cells = el('board').children;
  w.forEach(i => cells[i].classList.add('win'));

  // vẽ line
  const b = el('board').getBoundingClientRect();
  const getCenter = (i)=>{
    const r = cells[i].getBoundingClientRect();
    return {x: r.left + r.width/2 - b.left, y: r.top + r.height/2 - b.top};
  };
  const a = getCenter(w[0]), c = getCenter(w[2]);
  const dx = c.x - a.x, dy = c.y - a.y;
  const len = Math.hypot(dx,dy);
  const ang = Math.atan2(dy,dx)*180/Math.PI;

  const line = el('winLine');
  line.style.left = a.x+'px';
  line.style.top = a.y+'px';
  line.style.width = '0px';
  line.style.transform = `rotate(${ang}deg)`;
  line.classList.remove('hidden');

  // animate
  let t=0;
  const id = setInterval(()=>{
    t += 0.08;
    if(t>=1){ t=1; clearInterval(id); }
    line.style.width = (len*t)+'px';
  }, 16);
}
function hideLine(){
  const line = el('winLine');
  line.classList.add('hidden');
  line.style.width='0px';
}

// ====== AI ======
function aiPlay(){
  if(over) return;
  let move;
  if(difficulty==='easy'){
    move = randMove();
  }else if(difficulty==='medium'){
    move = findWin('O') ?? findWin('X') ?? randMove();
  }else{ // hard
    move = bestMove();
  }
  place(move, 'O');

  if(checkEnd('O')) return;

  current = 'X';
  setStatus();
}

function randMove(){
  const e = board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
  return e[Math.floor(Math.random()*e.length)];
}
function findWin(p){
  const e = board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
  for(const i of e){
    board[i]=p;
    if(getWin(p)){ board[i]=""; return i; }
    board[i]="";
  }
  return null;
}
function bestMove(){
  let best = -Infinity, move = null;
  for(let i=0;i<9;i++){
    if(board[i]===""){
      board[i]='O';
      const sc = minimax(false);
      board[i]='';
      if(sc>best){ best=sc; move=i; }
    }
  }
  return move ?? randMove();
}
function minimax(isMax){
  if(getWin('O')) return 1;
  if(getWin('X')) return -1;
  if(!board.includes("")) return 0;

  if(isMax){
    let best = -Infinity;
    for(let i=0;i<9;i++){
      if(board[i]===""){
        board[i]='O';
        best = Math.max(best, minimax(false));
        board[i]='';
      }
    }
    return best;
  }else{
    let best = Infinity;
    for(let i=0;i<9;i++){
      if(board[i]===""){
        board[i]='X';
        best = Math.min(best, minimax(true));
        board[i]='';
      }
    }
    return best;
  }
}

// init score on load
updateScore();
</script>
</body>
</html>
